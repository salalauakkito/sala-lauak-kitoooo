<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sala Lauak Kito</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    margin:0;
    background: linear-gradient(135deg, #FFF4E6, #FDEBD0);
    background-image: 
        radial-gradient(circle at 20% 20%, rgba(47,79,111,0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(30,58,95,0.08) 0%, transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(47,79,111,0.08) 0%, transparent 40%);
}

header{
    background: linear-gradient(90deg, #1E3A5F, #2F4F6F);
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    display:flex;
    justify-content:center;
    padding:30px;
}

.card{
    background:white;
    width:420px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

select,input{
    width:100%;
    padding:10px;
    margin:5px 0 12px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#2F4F6F;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1E3A5F;
}

#output{
    margin-top:15px;
    background:#FDEBD0;
    padding:12px;
    border-radius:10px;
}

.info{
    margin-top:20px;
    font-size:14px;
    line-height:1.6;
}

a{
    color:#2F4F6F;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Sala Lauak Kito</h1>
<p>Pemesanan Online • Lezat & Gurih 😆</p>
</header>

<div class="container">
<div class="card">

<h3>Pesan Produk</h3>

<label>Kategori</label>
<select id="kategori" onchange="updateMenu()">
    <option value="eceran">Eceran</option>
    <option value="paket">Paket</option>
</select>

<label>Pilih Produk</label>
<select id="produk"></select>

<label>Jumlah</label>
<input type="number" id="jumlah" value="1" min="1">

<button onclick="tambah()">Tambah ke Keranjang</button>

<hr>

<h3>Data Pemesan</h3>
<input type="text" id="nama" placeholder="Nama">
<input type="text" id="alamat" placeholder="Alamat">
<input type="text" id="hp" placeholder="No HP">

<label>Metode Pembayaran</label>
<select id="pembayaran" onchange="toggleBukti()">
    <option value="cash">Cash</option>
    <option value="transfer">Transfer</option>
</select>

<div id="buktiDiv" style="display:none;">
    <h3>Upload Bukti Pembayaran</h3>
    <input type="file" id="bukti">
</div>

<button onclick="checkout()">Konfirmasi Pesanan</button>

<div id="output"></div>

<div class="info">
<h3>Kontak & Lokasi</h3>

📍 Jalan No 10, Purus, Kec. Padang Barat, Kota Padang, Sumatera Barat<br><br>

🗺️ <a href="https://www.google.com/maps?q=Jalan+No+10+Purus+Padang+Barat+Padang+Sumatera+Barat" target="_blank">
Lihat di Google Maps
</a><br><br>

📞 081374548841
</div>

</div>
</div>

<script>
let keranjang=[];
let total=0;

function updateMenu(){
    let kategori=document.getElementById("kategori").value;
    let produk=document.getElementById("produk");

    produk.innerHTML="";

    if(kategori==="eceran"){
        produk.innerHTML=`
        <option value="frozen_eceran">Sala Frozen (Rp 200/butir)</option>
        <option value="goreng_eceran">Sala Goreng (Rp 500/butir)</option>
        `;
    }else{
        produk.innerHTML=`
        <option value="frozen_22">Frozen Isi 22 (Rp 7.000)</option>
        <option value="frozen_42">Frozen Isi 42 (Rp 15.000)</option>
        `;
    }
}
updateMenu();

function toggleBukti(){
    let metode=document.getElementById("pembayaran").value;
    document.getElementById("buktiDiv").style.display =
        metode==="transfer" ? "block" : "none";
}

function tambah(){
    let produk=document.getElementById("produk").value;
    let jumlah=parseInt(document.getElementById("jumlah").value);

    let namaProduk="", harga=0;

    if(produk==="frozen_eceran"){ namaProduk="Sala Frozen Eceran"; harga=200; }
    else if(produk==="goreng_eceran"){ namaProduk="Sala Goreng Eceran"; harga=500; }
    else if(produk==="frozen_22"){ namaProduk="Sala Frozen Isi 22"; harga=7000; }
    else if(produk==="frozen_42"){ namaProduk="Sala Frozen Isi 42"; harga=15000; }

    let subtotal=harga*jumlah;

    keranjang.push({namaProduk,jumlah,subtotal});
    total+=subtotal;

    alert("Produk masuk ke keranjang!");
}

function checkout(){
    if(keranjang.length===0){
        alert("Keranjang kosong!");
        return;
    }

    let nama=document.getElementById("nama").value;
    let alamat=document.getElementById("alamat").value;
    let hp=document.getElementById("hp").value;
    let metode=document.getElementById("pembayaran").value;

    // TAMPIL DI WEB
    let output=document.getElementById("output");
    let isi=`<h3>Pesanan Berhasil</h3>`;
    isi+=`Nama: ${nama}<br>Alamat: ${alamat}<br>HP: ${hp}<br>Pembayaran: ${metode}<br><hr>`;
    keranjang.forEach(item=>{
        isi+=`${item.namaProduk} x ${item.jumlah} = Rp ${item.subtotal.toLocaleString()}<br>`;
    });
    isi+=`<hr><b>Total: Rp ${total.toLocaleString()}</b>`;
    output.innerHTML=isi;

    // KIRIM KE WHATSAPP
    let pesan=`Pesanan Sala Lauak Kito%0A`;
    pesan+=`Nama: ${nama}%0AAlamat: ${alamat}%0AHP: ${hp}%0A`;
    pesan+=`Pembayaran: ${metode}%0A%0A`;

    keranjang.forEach(item=>{
        pesan+=`${item.namaProduk} x ${item.jumlah}%0A`;
    });

    pesan+=`%0ATotal: Rp ${total}`;

    window.open(`https://wa.me/6281374548841?text=${pesan}`);
}
</script>

</body>
</html>
